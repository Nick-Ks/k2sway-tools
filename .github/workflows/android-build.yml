name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Add Capacitor Android Platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Add Microphone Permissions to AndroidManifest.xml
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          # Insert RECORD_AUDIO and MODIFY_AUDIO_SETTINGS permissions after INTERNET permission
          sed -i '/<uses-permission android:name="android.permission.INTERNET" \/>/a \    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" \/>' $MANIFEST_PATH
          echo "Updated AndroidManifest.xml with Audio permissions"

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (Debug)
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: K2Sway-MusicTools-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
